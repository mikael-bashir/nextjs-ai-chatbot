name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ~/nextjs-ai-chatbot
            git pull origin main

            cat > .env << 'EOF'
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            XAI_MASTER=${{ secrets.XAI_MASTER }}
            XAI_FREE_KEY_1=${{ secrets.XAI_FREE_KEY_1 }}
            XAI_FREE_KEY_2=${{ secrets.XAI_FREE_KEY_2 }}
            XAI_FREE_KEY_3=${{ secrets.XAI_FREE_KEY_3 }}
            MEM0_API_KEY=${{ secrets.MEM0_API_KEY }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PRICE_TOPUP_5=${{ secrets.STRIPE_PRICE_TOPUP_5 }}
            STRIPE_PRICE_TOPUP_20=${{ secrets.STRIPE_PRICE_TOPUP_20 }}
            STRIPE_PRICE_TOPUP_50=${{ secrets.STRIPE_PRICE_TOPUP_50 }}
            STRIPE_PRICE_SUB_PRO=${{ secrets.STRIPE_PRICE_SUB_PRO }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EOF

            docker compose up -d --build
            docker image prune -f
